site_name: Lmlib Documenation
theme:
  name: material
  favicon: images/favicon.png
  logo: images/logo.svg
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey 
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs       # Top tabs for categories
    - navigation.sections   # Sections in sidebar
    - navigation.tracking   # Highlights active section
    - navigation.top        # Back to top button
    - toc.follow
    - content.code.copy
extra:
  manifest: null
use_directory_urls: false
# Keep build-only scripts out of the built site (they live under docs/ for
# convenience but are not pages/assets). Both the API page generator
# (gen_api.py) and the gallery builder (create_gallery.py) live here.
# Note: the generated galleries themselves (docs/_generated/) are NOT excluded;
# they are the actual pages the nav below points to.
exclude_docs: |
  scripts_docs/

nav:
  - Home: index.md
  - Getting Started:
    - What is LMLib?: getting_started/whats_lmlib.md
    - State-Space Tutorial: getting_started/state-space-tutorial.md
    - Coding Examples:
      - Windowed State Space Filters: _generated/coding/10-windowed-state-space-filters-basic/index.md
      - Backend: _generated/coding/13-backend/index.md
      - Polynomials Basics: _generated/coding/20-polynomials-basics/index.md
  - Installation: getting_started/installation.md
  - Catalog:
    - Biosignals: _generated/catalog/biosignals/index.md
    - Generators: _generated/catalog/generators/index.md
  - Examples: 
    - Detection: _generated/examples/11-detection/index.md
    - Filtering: _generated/examples/12-filtering/index.md
    - Polynomials Calculus: _generated/examples/21-polynomials-calculus/index.md
    - APP Changepoint Detection: _generated/examples/40-app-changepoint-detection/index.md
    - Convolution: _generated/examples/50-convolution/index.md
    - Localized Polynpmials: _generated/examples/70-localized-polynomials/index.md
    - N Dimensional: _generated/examples/80-nDimensional/index.md
  - API: api/
  - Bibliography: bibliography.md
  - About Us: about_us.md


plugins:
  - search
  - gen-files:
      scripts:
        - docs/scripts_docs/gen_api.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      custom_templates: docs/templates
      handlers:
        python:
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://docs.scipy.org/doc/scipy/objects.inv
          options:
            show_root_heading: true
            show_source: false
            show_root_full_path: false
            heading_level: 2
            parameter_headings: false
            members_order: source
            docstring_section_style: list  # or list or spaced or table
            show_if_no_docstring: true
            filters: public
            inherited_members: true
            docstring_style: numpy
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            group_by_category: true
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_inheritance_diagram: true # visual inheritance graph
            summary:
              attributes: true
              functions: true


 # --- better layout ---
extra_css:
  - css/mkdocstrings.css   

# --- Math rendering ---
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - admonition
  - codehilite
  # Lets docstrings pull in the gallery example scripts verbatim via
  # `--8<-- "catalog/generators/<file>.py"`, so the example code lives in a
  # single place (the gallery .py that also generates the PNG) instead of being
  # duplicated into the docstrings.
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  - pymdownx.superfences:
      # This enables Mermaid diagram rendering in Markdown
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# --- MathJax loader ---
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
